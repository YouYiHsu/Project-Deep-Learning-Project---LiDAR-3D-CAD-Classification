<!DOCTYPE html>
<html>

<head>
    <title>上傳圖片</title>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="/public/image/icon.ico" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="/public/css/style.css">
</head>

<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <form action="http://localhost:8081/upload/success" method="POST" enctype="multipart/form-data">
        <nav>
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                    <div class="upltitle">
                        <br><strong>填寫名字和上傳大頭照</strong>
                    </div>
                    <div class="wrap">
                        <label for="text">請輸入名字</label>
                        <input type="text" name="newname" class="logintext" placeholder="請輸入名字"
                            pattern="[a-zA-Z0-9]{,20}" required>
                        <p><strong> 注意:請輸入英文和數字 </strong></p>
                        <div id="btnupload">
                            <input type="file" name="image" class="update1" accept="image/*" required>
                        </div>
                        <div id="btn4">
                            <input type="submit" value="上傳" class="update">
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </form>

    <form action="http://localhost:8081/choose" method="POST">
        <nav>
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                    <div class="wrap">
                        <div id="btn5">
                            <br>
                            <input type="submit" value="回到選擇" class="choose">
                        </div>
                    </div>
                </div>
            </div>
        </nav>
        <p class="copyright1">Copyright &copy; 2021 Eddie Hsu.&ensp;</p>
    </form>
</body>

</html>
